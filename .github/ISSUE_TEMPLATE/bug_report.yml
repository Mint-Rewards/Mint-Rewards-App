name: Bug Report
description: Report a bug found during internal testing
labels: ["bug", "internal-testing"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [iOS App, Android App, Web Portal, Backend API]
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options: [Staging, Production]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?