name: Mobile CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  test:
    name: Test & Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: SCA — npm audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-internal:
    name: Build Internal Distribution
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'   # Only on dev merges

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build internal distribution
        run: eas build --profile internal --platform all --non-interactive